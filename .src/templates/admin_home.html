[[extend 'base.html']]

[[block page_title]]Admin[[end]]

[[block page_nav_links]]
<a href="[[=URL('admin/index')]]" class="hover:text-green-300 transition-colors">Admin</a>
[[end]]
[[block page_nav_links_mobile]]
<a href="[[=URL('admin/index')]]" class="block px-2 py-1.5 rounded hover:bg-forest-700 transition-colors">Admin</a>
[[end]]

<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

  <nav class="flex items-center gap-2 text-sm text-gray-400 mb-6">
    <span class="text-gray-700 font-medium">Admin</span>
  </nav>

  <div class="mb-10">
    <h1 class="text-3xl font-bold text-gray-900">Admin</h1>
    <p class="text-sm text-gray-500 mt-1">Velg et område å administrere.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- Pages card -->
    <a href="[[=URL('admin/pages')]]"
       class="group flex flex-col gap-4 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm
              hover:border-green-400 hover:shadow-md transition-all">
      <div class="flex items-center justify-center h-12 w-12 rounded-xl bg-green-50 group-hover:bg-green-100 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <h2 class="text-base font-semibold text-gray-900 group-hover:text-green-700 transition-colors">Sider</h2>
        <p class="text-sm text-gray-500 mt-0.5">Opprett og rediger innholdssider.</p>
      </div>
      <div class="mt-auto flex items-center gap-1 text-xs font-medium text-green-600 group-hover:gap-2 transition-all">
        Gå til sider
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>
    </a>

  </div>

</div>
